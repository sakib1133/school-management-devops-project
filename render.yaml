services:
  - type: web
    name: school-portal
    runtime: node
    plan: free

    buildCommand: cd App && npm install
    startCommand: cd App && npm start

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      # Database path on Render persistent disk
      - key: DB_PATH
        value: /var/data/database.sqlite

      # Secrets - set these in Render dashboard
      - key: JWT_SECRET
        sync: false

      - key: SESSION_SECRET
        sync: false

      - key: ENCRYPTION_KEY
        sync: false

      # Admin initial password - ONLY used for first admin creation on fresh DB
      # After admin is created, change password via admin profile
      - key: ADMIN_PASSWORD
        sync: false

    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1

    healthCheckPath: /health
