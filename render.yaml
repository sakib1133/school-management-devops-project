services:
  - type: web
    name: school-portal
    runtime: node

    buildCommand: cd App && npm install
    startCommand: cd App && npm start

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      - key: DB_PATH
        value: /opt/render/project/src/App/data/school.db

      - key: JWT_SECRET
        generateValue: true

      - key: SESSION_SECRET
        generateValue: true

      - key: ENCRYPTION_KEY
        generateValue: true

    disk:
      name: data
      mountPath: /opt/render/project/src/App/data
      sizeGB: 1
